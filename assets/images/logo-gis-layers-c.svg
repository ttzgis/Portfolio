    <path d="M120 86l-34 19" stroke-width="1.7" opacity="0.7"/>
    <path d="M120 86l34 19" stroke-width="1.7" opacity="0.7"/>
    <path d="M120 138l-34 19" stroke-width="1.7" opacity="0.7"/>
    <path d="M120 138l34 19" stroke-width="1.7" opacity="0.7"/>
  </g>
