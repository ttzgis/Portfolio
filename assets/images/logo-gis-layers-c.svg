<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">GIS Layers Logo C</title>
  <desc id="desc">Three clean stacked tiles with strong depth and minimal detailing.</desc>
  <defs>
    <linearGradient id="faceC1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbf8"/>
      <stop offset="100%" stop-color="#e7efe9"/>
    </linearGradient>
    <linearGradient id="faceC2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dce9e0"/>
      <stop offset="100%" stop-color="#c2d6c9"/>
    </linearGradient>
    <linearGradient id="faceC3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b9d0c0"/>
